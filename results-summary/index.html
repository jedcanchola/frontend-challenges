<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="results-container">
    <section class="result">
      <h4>Your Result</h4>
      <div class="result-circle">
        <div class="score-circle">
          <h2>76</h2>
          <span>of 100</span>
        </div>
      </div>
      <div class="score-text">
        <h3>Great</h3>
        <p>You scored higher than 65% of the people who have taken these tests.</p>
      </div>
    </section>

    <section class="summary">
        <h4>Summary</h4>
          <ul class="topics">
            <li class="reaction">
              <div class="topic">
                <img src="/assets/images/icon-reaction.svg" alt="Reaction">
                Reaction
              </div>
             <div class="topic-score">
              <p><span>80</span>/ 100</p>
             </div>
            </li>
            <li class="memory">
              <div class="topic">
                <img src="/assets/images/icon-memory.svg" alt="memory">
                Memory
              </div>
             <div class="topic-score">
              <p><span>92</span>/ 100</p>
             </div>
            </li>
            <li class="verbal">
              <div class="topic">
                <img src="/assets/images/icon-verbal.svg" alt="verbal">
                Verbal
              </div>
             <div class="topic-score">
              <p><span>61</span>/ 100</p>
             </div>
            </li>
            <li class="visual">
              <div class="topic">
                <img src="/assets/images/icon-visual.svg" alt="visual">
                Visual
              </div>
             <div class="topic-score">
              <p><span>72</span>/ 100</p>
             </div>
            </li>
          </ul>
        <button>Continue</button>
    </section>
  </div>

<!-- 
  Your Result
  76
  of 100

  Great
  You scored higher than 65% of the people who have taken these tests.
  
  Summary

  Reaction
  80 / 100

  Memory
  92 / 100

  Verbal
  61 / 100

  Visual
  72 / 100

  Continue -->

</body>
</html>
